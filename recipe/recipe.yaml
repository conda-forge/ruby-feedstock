context:
  name: ruby
  version: "3.4.4"
  major_minor: ${{ (version | split('.'))[0:2] | join('.') }}

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://cache.ruby-lang.org/pub/ruby/${{ major_minor }}/ruby-${{ version }}.tar.gz
  sha256: a0597bfdf312e010efd1effaa8d7f1d7833146fdc17950caa8158ffa3dcbfa85

build:
  number: 0

requirements:
  build:
    # ruby for bootstrapping itself
    - ruby   
    - gnuconfig  # [unix]
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - autoconf    # [unix]
    - automake    # [unix]
    - make        # [unix]
    - pkg-config
  host:
    - gdbm        # [x86 and unix]
    - gettext     # [osx]
    - libffi
    - libxcrypt   # [linux]
    - ncurses     # [unix]
    - readline    # [unix]
    - gmp         # [unix]
    - openssl
    - yaml
    - zlib
  run:
    - gettext     # [osx]
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x') }}
  ignore_run_exports:
    from_package: 
      # We need CXX during build time to generate rbconfig.rb
      - ${{ compiler('cxx') }}

